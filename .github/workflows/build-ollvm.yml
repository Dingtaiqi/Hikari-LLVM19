name: Build Hikari LLVM for Android NDK

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-ollvm.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    runs-on: windows-2025
    name: Hikari-LLVM19 (windows-x86_64)
    steps:
    - uses: actions/checkout@v4
      with:
        path: hikari

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: C:\Users\runneradmin\ccache
        # Use a stable key: cache resets when the workflow file changes
        key: hikari-ccache-win-${{ hashFiles('.github/workflows/build-ollvm.yml') }}
        restore-keys: hikari-ccache-win-

    - name: Install ccache
      run: choco install ccache -y --no-progress
    - name: Setup ccache
      run: |
        ccache --set-config=cache_dir=C:\Users\runneradmin\ccache
        ccache --set-config=max_size=5G
        ccache --zero-stats
        ccache --show-config

    - name: Link Obfuscation to clang
      run: echo "target_link_libraries(clang PRIVATE LLVMObfuscation)" >> hikari/clang/tools/driver/CMakeLists.txt

    - name: Configure
      run: |
        cmake -S hikari/llvm -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
          -DLLVM_ENABLE_PROJECTS="clang;lld" `
          -DLLVM_TARGETS_TO_BUILD="X86;ARM;AArch64" `
          -DLLVM_ENABLE_ZSTD=OFF `
          -DLLVM_USE_CRT_RELEASE=MT `
          -DCMAKE_C_COMPILER_LAUNCHER=ccache `
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache `
          -DLLVM_INCLUDE_TESTS=OFF `
          -DLLVM_INCLUDE_EXAMPLES=OFF `
          -DLLVM_INCLUDE_BENCHMARKS=OFF

    - name: Build
      run: cmake --build build -j $env:NUMBER_OF_PROCESSORS --target clang 2>&1 | Select-Object -Last 30

    - name: ccache stats
      run: ccache -s

    - name: Package
      run: |
        mkdir out\bin
        copy build\bin\clang.exe out\bin\
        copy build\bin\clang++.exe out\bin\
        if exist build\lib\clang xcopy /E /I build\lib\clang out\lib\clang
        Compress-Archive -Path out\* -DestinationPath hikari-llvm19-windows.zip

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: hikari-llvm19-windows
        path: hikari-llvm19-windows.zip
        retention-days: 90

  ubuntu:
    runs-on: ubuntu-24.04
    name: Hikari-LLVM19 (linux-x86_64)
    steps:
    - uses: actions/checkout@v4
      with:
        path: hikari

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: hikari-ccache-linux-${{ hashFiles('.github/workflows/build-ollvm.yml') }}
        restore-keys: hikari-ccache-linux-

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build ccache

    - name: Setup ccache
      run: |
        ccache --set-config=max_size=5G
        ccache --zero-stats

    - name: Link Obfuscation to clang
      run: echo "target_link_libraries(clang PRIVATE LLVMObfuscation)" >> hikari/clang/tools/driver/CMakeLists.txt

    - name: Configure
      run: |
        cmake -S hikari/llvm -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang;lld" \
          -DLLVM_TARGETS_TO_BUILD="X86;ARM;AArch64" \
          -DLLVM_ENABLE_ZSTD=OFF \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DLLVM_INCLUDE_TESTS=OFF \
          -DLLVM_INCLUDE_EXAMPLES=OFF \
          -DLLVM_INCLUDE_BENCHMARKS=OFF

    - name: Build
      run: cmake --build build -j$(nproc) --target clang 2>&1 | tail -30

    - name: ccache stats
      run: ccache -s

    - name: Package
      run: |
        mkdir -p out/bin out/lib
        cp build/bin/clang build/bin/clang++ out/bin/
        if [ -d build/lib/clang ]; then cp -r build/lib/clang out/lib/; fi
        tar -czf hikari-llvm19-linux.tar.gz -C out .

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: hikari-llvm19-linux
        path: hikari-llvm19-linux.tar.gz
        retention-days: 90
